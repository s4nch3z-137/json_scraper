<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology JSON Architect | Kurdish Sorani</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Outfit', 'Noto Sans Arabic', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
        }

        @media (max-width: 1000px) {
            .app-container { grid-template-columns: 1fr; }
        }

        .editor-side {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1, h2, h3 {
            margin-top: 0;
            letter-spacing: -0.5px;
        }

        h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        input, textarea, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 15px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-group input { width: auto; margin: 0; cursor: pointer; }

        .dynamic-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: 10px;
        }

        .component-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .remove-btn:hover { background: #ef4444; color: white; }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        button.secondary:hover {
            background: var(--primary);
            color: white;
        }

        .preview-side {
            position: sticky;
            top: 40px;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .json-viewer {
            flex-grow: 1;
            background: #000;
            border-radius: 15px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }

        .fab-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .btn-success {
            background: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            background: #059669;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Editor Side -->
    <div class="editor-side">
        <div class="glass-panel">
            <h1>Biology JSON Architect</h1>
            
            <div class="section">
                <h2><span>📄</span> مێتادایتای لاپەڕە (Page Metadata)</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>ژمارەی لاپەڕە</label>
                        <input type="text" id="pageNumber" placeholder="بۆ نموونە: 15" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>ناوی بەش (Chapter Title)</label>
                        <input type="text" id="chapterTitle" placeholder="ناوی بەش لێرە بنووسە..." oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>ژمارەی پۆلێن (Kart Number)</label>
                        <input type="text" id="kartNumber" placeholder="بۆ نموونە: 1-3" oninput="updatePreview()">
                    </div>
                    <div class="input-group checkbox-group">
                        <input type="checkbox" id="isFrontPage" onchange="updatePreview()">
                        <label>ئایا ئەمە لاپەڕەی یەکەمی بەشە؟</label>
                    </div>
                </div>
            </div>

            <div class="section dynamic-section">
                <h2><span>📝</span> ناوەڕۆکی سەرەکی (Main Content)</h2>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>ناونیشانی سەرەکی</label>
                    <input type="text" id="mainTitle" placeholder="ناونیشانی لاپەڕەکە..." oninput="updatePreview()">
                </div>
                <div class="input-group">
                    <label>پەرەگرافەکانی جەستەی دەق (Body Paragraphs)</label>
                    <textarea id="mainParagraphs" placeholder="هەر پەرەگرافێک لە دێڕێکی نوێ بنووسە..." rows="4" oninput="updatePreview()"></textarea>
                </div>
            </div>

            <div class="section dynamic-section">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <h2><span>🔖</span> ناونیشانی لاوەکی (Subtitles)</h2>
                    <button class="secondary" onclick="addSubtitle()">+ زیادکردنی ناونیشان</button>
                </div>
                <div id="subtitlesList"></div>
            </div>

            <div class="section dynamic-section">
                <h2><span>📦</span> سندوقە تایبەتییەکان (Special Boxes)</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>سندوقی گرنگی (Importance Box)</label>
                        <textarea id="importanceBox" placeholder="گرنگییەکانی ئەم بەشە..." rows="3" oninput="updatePreview()"></textarea>
                    </div>
                    <div class="input-group">
                        <label>سندوقی پێداچوونەوە (Review Box)</label>
                        <textarea id="reviewBox" placeholder="پرسیارەکانی پێداچوونەوە..." rows="3" oninput="updatePreview()"></textarea>
                    </div>
                </div>
                <div class="input-group">
                    <label>ئایا دەزانی؟ (Did You Know?)</label>
                    <textarea id="didYouKnow" placeholder="زانیاری سەرنجڕاکێش..." rows="2" oninput="updatePreview()"></textarea>
                </div>
            </div>

            <div class="section dynamic-section">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <h2><span>🖼️</span> وێنە و خشتەکان (Visual Elements)</h2>
                    <button class="secondary" onclick="addVisual()">+ زیادکردنی وێنە/خشتە</button>
                </div>
                <div id="visualsList"></div>
            </div>
        </div>
    </div>

    <!-- Preview Side -->
    <div class="preview-side">
        <div class="glass-panel fab-container">
            <h3><span>🚀</span> کارەکان</h3>
            <button class="btn-main" onclick="copyToClipboard()">
                <span>📋</span> کۆپیکردنی JSON
            </button>
            <button class="btn-main btn-success" onclick="downloadJSON()">
                <span>📥</span> دابەزاندنی JSON
            </button>
            <button class="btn-main" style="background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); box-shadow: none;" onclick="resetForm()">
                <span>🔄</span> دەستپێکردنەوە
            </button>
        </div>

        <div class="glass-panel" style="flex-grow: 1; display:flex; flex-direction:column;">
            <h3><span>💎</span> مۆدێلی کۆتایی</h3>
            <div id="jsonPreview" class="json-viewer"></div>
        </div>
    </div>
</div>

<script>
    let subtitleCount = 0;
    let visualCount = 0;

    function addSubtitle() {
        const id = ++subtitleCount;
        const container = document.getElementById('subtitlesList');
        const div = document.createElement('div');
        div.className = 'component-card';
        div.id = `subtitle-card-${id}`;
        div.innerHTML = `
            <button class="remove-btn" onclick="removeElement('subtitle-card-${id}')">لابردن</button>
            <div class="input-group" style="margin-bottom: 10px;">
                <label>ناونیشانی لاوەکی</label>
                <input type="text" class="sub-title-input" placeholder="ناونیشان..." oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>دەقی ناونیشانەکە</label>
                <textarea class="sub-body-input" placeholder="پەرەگرافەکان لێرە بنووسە..." rows="3" oninput="updatePreview()"></textarea>
            </div>
        `;
        container.appendChild(div);
        updatePreview();
    }

    function addVisual() {
        const id = ++visualCount;
        const container = document.getElementById('visualsList');
        const div = document.createElement('div');
        div.className = 'component-card';
        div.id = `visual-card-${id}`;
        div.innerHTML = `
            <button class="remove-btn" onclick="removeElement('visual-card-${id}')">لابردن</button>
            <div class="form-grid">
                <div class="input-group">
                    <label>جۆر</label>
                    <select class="vis-type" onchange="updatePreview()">
                        <option value="figure">وێنە (Figure)</option>
                        <option value="table">خشتە (Table)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>ژمارە</label>
                    <input type="text" class="vis-num" placeholder="بۆ نموونە: 9-1" oninput="updatePreview()">
                </div>
            </div>
            <div class="input-group" style="margin-top:10px;">
                <label>ڕوونکردنەوە (Explanation)</label>
                <textarea class="vis-exp" placeholder="وەسفی وێنەکە بنووسە..." rows="2" oninput="updatePreview()"></textarea>
            </div>
        `;
        container.appendChild(div);
        updatePreview();
    }

    function removeElement(id) {
        document.getElementById(id).remove();
        updatePreview();
    }

    function getFormValue(id) {
        return document.getElementById(id).value.trim() || null;
    }

    function updatePreview() {
        const data = {
            page_metadata: {
                page_number: getFormValue('pageNumber'),
                chapter_title: getFormValue('chapterTitle'),
                kart_number: getFormValue('kartNumber'),
                is_chapter_front_page: document.getElementById('isFrontPage').checked
            },
            content: {
                main_title: getFormValue('mainTitle'),
                body_paragraphs: getFormValue('mainParagraphs') ? getFormValue('mainParagraphs').split('\n').filter(p => p.trim() !== "") : [],
                subtitles: [],
                division_importance_box: getFormValue('importanceBox'),
                division_review_box: getFormValue('reviewBox'),
                did_you_know: getFormValue('didYouKnow'),
                visual_elements: []
            }
        };

        // Collect Subtitles
        document.querySelectorAll('#subtitlesList .component-card').forEach(card => {
            const title = card.querySelector('.sub-title-input').value.trim();
            const body = card.querySelector('.sub-body-input').value.trim();
            if (title || body) {
                data.content.subtitles.push({
                    subtitle: title,
                    body_paragraphs: body ? body.split('\n').filter(p => p.trim() !== "") : []
                });
            }
        });

        // Collect Visuals
        document.querySelectorAll('#visualsList .component-card').forEach(card => {
            const type = card.querySelector('.vis-type').value;
            const num = card.querySelector('.vis-num').value.trim();
            const exp = card.querySelector('.vis-exp').value.trim();
            if (num || exp) {
                data.content.visual_elements.push({
                    type: type,
                    number: num,
                    explanation: exp,
                    table_data: null
                });
            }
        });

        const finalOutput = [data];
        document.getElementById('jsonPreview').textContent = JSON.stringify(finalOutput, null, 2);
        return finalOutput;
    }

    function copyToClipboard() {
        const json = document.getElementById('jsonPreview').textContent;
        navigator.clipboard.writeText(json).then(() => {
            alert("JSON کۆپی کرا بۆ کلیپبۆرد!");
        });
    }

    function downloadJSON() {
        const data = updatePreview();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Page_${data[0].page_metadata.page_number || 'export'}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function resetForm() {
        if (confirm("دڵنیای لە سڕینەوەی هەموو داتاکان؟")) {
            window.location.reload();
        }
    }

    // Initialize
    updatePreview();
</script>

</body>
</html>
